name: CI/CD

on:
  push:
    branches: [main]
  pull_request:

jobs:

  lint:
    name: "Stage 1 — Static analysis (Checkstyle)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - uses: gradle/actions/setup-gradle@v4
      - name: Run Checkstyle
        run: ./gradlew checkstyleMain checkstyleTest
      - name: Upload Checkstyle reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: checkstyle-reports
          path: "**/build/reports/checkstyle/"

  test:
    name: "Stage 2 — Automated tests (JUnit)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - uses: gradle/actions/setup-gradle@v4
      - name: Run all tests
        run: ./gradlew test
      - name: Run fast-tagged tests
        run: ./gradlew testFast
      - name: Run slow-tagged tests
        run: ./gradlew testSlow
      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            build/reports/tests/
            build/test-results/

  build:
    name: "Stage 3 — Build fat JAR"
    needs: [lint, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - uses: gradle/actions/setup-gradle@v4
      - name: Build shadow JAR
        run: ./gradlew shadowJar
      - name: Verify Main-Class
        run: unzip -p build/libs/Hw1-all.jar META-INF/MANIFEST.MF | grep "Main-Class"
      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: hw1-fat-jar
          path: build/libs/Hw1-all.jar

  docker:
    name: "Stage 4 — Build & push Docker image"
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/javaautomization-kma
          tags: |
            type=sha
            type=raw,value=latest
      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: app.Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
